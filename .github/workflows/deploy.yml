name: Deploy to Azure Container Apps

# 수동 실행 전용(workflow_dispatch). 비용 방지를 위해 자동 main push 트리거를 비활성화함.
# (Azure 리소스를 모두 삭제한 상태 — 재배포하려면 인프라를 먼저 프로비저닝한 뒤 수동 실행.)
# 사전 준비(저장소 Secrets):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID  (OIDC 페더레이션 자격증명)
#   AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, AZURE_OPENAI_DEPLOYMENT, AZURE_OPENAI_API_VERSION
# 비고: 이 구독은 ACR Tasks(클라우드 빌드)가 막혀 있어 러너에서 직접 docker build/push 한다.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: pulseplan-rg
  APP_NAME: pulseplan
  ACR_NAME: pulseplanacr25437
  IMAGE: pulseplanacr25437.azurecr.io/pulseplan:${{ github.sha }}

jobs:
  deploy:
    name: Build image & deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure containerapp extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Build & push image (runner Docker → ACR)
        run: |
          az acr login --name "$ACR_NAME"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Container Apps
        run: |
          ACR_PWD=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv)
          az containerapp registry set \
            --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --server "$ACR_NAME.azurecr.io" --username "$ACR_NAME" --password "$ACR_PWD" \
            --only-show-errors
          az containerapp secret set \
            --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --secrets aoai-key="${{ secrets.AZURE_OPENAI_API_KEY }}" --only-show-errors
          az containerapp update \
            --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE" \
            --set-env-vars \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_DEPLOYMENT="${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" \
              AZURE_OPENAI_API_VERSION="${{ secrets.AZURE_OPENAI_API_VERSION }}" \
              AZURE_OPENAI_API_KEY=secretref:aoai-key \
            --only-show-errors

      - name: Output demo URL
        run: |
          FQDN=$(az containerapp show --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "DEMO URL: https://$FQDN"
          echo "### Demo URL: https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
