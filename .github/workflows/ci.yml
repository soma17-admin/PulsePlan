name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Lint · Build · Harness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start production server
        run: |
          npm start &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:3000; then
              echo "server up"
              break
            fi
            sleep 2
          done

      - name: Run self-check harness
        # Azure 자격증명이 없으면 스모크는 로컬 플래너로 폴백한다(차단 없음).
        run: node harness/run.mjs

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

      - name: Upload harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-report
          path: harness/report.md
          if-no-files-found: ignore
